  <stop offset="45%" stop-color="#0EA5E9" stop-opacity="0.06"/>
  <stop offset="50%" stop-color="#38BDF8" stop-opacity="0.55"/>
  <stop offset="55%" stop-color="#0EA5E9" stop-opacity="0.06"/>
  <stop offset="100%" stop-color="#7C3AED" stop-opacity="0"/>
</linearGradient>
